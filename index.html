<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>D&amp;D Taverna - Hero's Ledger</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="D&amp;D Taverna">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/9QL7K2ZV/logo.png">
    <meta name="theme-color" content="#3e2723">

    <style>
        :root { --wood: #3e2723; --stone: #424242; --amber: #ffca28; --gold: #b8860b; --parchment: #f5e1b6; }
        
        html, body { overscroll-behavior: none !important; -webkit-overflow-scrolling: auto; margin: 0; height: 100%; width: 100%; position: fixed; top: 0; left: 0; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }
        body { font-family: 'Georgia', serif; background-color: var(--wood); color: #d7ccc8; }
        
        .login-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; overflow-y: auto; touch-action: pan-y; }
        .scroll-box { background: #212121; padding: 20px; border: 4px solid var(--stone); border-radius: 8px; width: 85%; max-width: 350px; text-align: center; }
        
        input, select { background: #424242; color: white; border: 1px solid #757575; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; font-size: 16px; border-radius: 4px; }
        input[type="checkbox"], input[type="radio"] { width: auto !important; margin: 0 5px 0 0 !important; transform: scale(1.2); cursor: pointer; }
        
        #multi-selector { background: #5d4037; padding: 10px; border: 2px solid var(--gold); margin-bottom: 8px; border-radius: 5px; display: none; max-height: 120px; overflow-y: auto; touch-action: pan-y; text-align: left; }
        .check-item { display: flex; align-items: center; justify-content: flex-start; margin-bottom: 8px; color: white; font-size: 0.9rem; cursor: pointer; width: 100%; }

        #game-ui { display: none; flex-direction: column; height: 100dvh; width: 100vw; position: fixed; top: 0; left: 0; overflow: hidden; overscroll-behavior: none; }
        header { background: var(--stone); color: var(--amber); padding: calc(8px + env(safe-area-inset-top, 0px)) 8px 8px 8px; text-align: center; border-bottom: 2px solid var(--gold); position: relative; }
        .exit-btn { position: absolute; left: 10px; top: calc(8px + env(safe-area-inset-top, 0px)); background: #b71c1c; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
        
        .vault-container { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; border-bottom: 1px solid #444; }
        .vault-card { flex-shrink: 0; width: 60px; text-align: center; cursor: pointer; position: relative; }
        .vault-card img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .vault-card div { font-size: 0.6rem; color: var(--amber); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .del-vault { position: absolute; top: -5px; right: 5px; background: #b71c1c; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 12px; line-height: 16px; text-align: center; border: 1px solid var(--gold); z-index: 5; }

        .settings-btn { position: absolute; right: 10px; top: 8px; background: none; border: none; color: var(--amber); font-size: 1.2rem; cursor: pointer; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: #212121; padding: 20px; border-radius: 8px; border: 2px solid var(--gold); width: 300px; max-height: 90vh; overflow-y: auto; touch-action: pan-y; }
        
        #party-bar { display: flex; gap: 10px; padding: 10px; background: rgba(0,0,0,0.6); overflow-x: auto; min-height: 70px; align-items: center; }
        .pg-tag { background: var(--parchment); color: #3e2723; border: 2px solid var(--gold); padding: 5px 10px; border-radius: 5px; min-width: 140px; display: flex; align-items: center; gap: 8px; position: relative; flex-shrink: 0; transition: all 0.3s; }
        .npc-tag { border-color: #b71c1c; background: #ef9a9a; }
        .boss-tag { border: 3px solid #ffd700 !important; background: linear-gradient(135deg, #fff3b0 0%, #f5e1b6 50%, #fff3b0 100%); box-shadow: 0 0 10px #ffca28; animation: boss-shine 3s infinite; }
        
        /* FIX: UI PG Morti - Colore Testo e Sfondo */
        .dead-tag { filter: grayscale(100%) brightness(0.65); border-color: #222 !important; background: #555 !important; color: #ddd !important; }
        .dead-tag small { color: #000 !important; font-weight: 900; background: rgba(255,255,255,0.6); padding: 1px 4px; border-radius: 3px; display: inline-block; margin-top: 2px; }

        @keyframes boss-shine { 0% { filter: brightness(1); } 50% { filter: brightness(1.2); } 100% { filter: brightness(1); } }
        @keyframes hitShake { 0% { background-color: #b71c1c; transform: translate(2px, 1px); } 20% { transform: translate(-3px, 0px); } 40% { transform: translate(3px, 2px); } 60% { transform: translate(-3px, 1px); } 80% { transform: translate(2px, -1px); } 100% { transform: translate(0, 0); } }
        @keyframes healPulse { 0% { background-color: #4caf50; box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); transform: scale(1); } 50% { transform: scale(1.05); } 100% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); transform: scale(1); } }
        .anim-hit { animation: hitShake 0.6s ease-in-out; }
        .anim-heal { animation: healPulse 0.6s ease-in-out; }

        .avatar-container { position: relative; width: 35px; height: 35px; flex-shrink: 0; }
        .avatar-circle { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .hp-overlay { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; mix-blend-mode: multiply; }
        
        #chat-flow { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 10px; background: rgba(0,0,0,0.3); overscroll-behavior-y: none; touch-action: pan-y; }
        .chat-bubble { display: flex; gap: 8px; margin-bottom: 10px; }
        .chat-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink:0; }
        .chat-text { background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 5px; max-width: 80%; font-size: 0.9rem; border-left: 3px solid transparent; }
        .chat-text[style*="color: #ff4444"] { border-left-color: #ff4444 !important; font-weight: bold; background: rgba(255, 68, 68, 0.1); }
        .chat-text[style*="color: #4444ff"] { border-left-color: #4444ff !important; font-weight: bold; background: rgba(68, 68, 255, 0.1); }
        
        .input-area { background: var(--stone); padding: 10px; border-top: 2px solid var(--gold); }
        .btn-taverna { background: var(--gold); color: black; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        .chat-time { font-size: 0.65rem; color: #aaa; margin-left: 5px; font-weight: normal; }
        .hidden { display: none !important; }
        .recent-rooms { margin-top: 15px; text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; border: 1px dashed var(--gold); }
        .room-chip { display: inline-block; background: var(--stone); color: var(--amber); padding: 4px 8px; margin: 4px 2px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; position: relative; }
        .del-room { position: absolute; top: -8px; right: -5px; background: #b71c1c; color: white; border-radius: 50%; width: 14px; height: 14px; font-size: 10px; line-height: 14px; text-align: center; border: 1px solid var(--gold); }
        
        .cond-badge { font-size: 0.6rem; background: #b71c1c; color: white; padding: 1px 4px; border-radius: 3px; margin-right: 2px; display: inline-block; margin-top: 2px; }
        .lang-select { background: #3e2723; color: var(--amber); border: 1px solid var(--gold); font-size: 0.7rem; padding: 2px; margin-bottom: 5px; border-radius: 4px; }
        .manage-option { display: block; background: #444; color: white; padding: 10px; margin: 5px 0; border-radius: 4px; cursor: pointer; text-align: left; border: 1px solid #666; }
        .manage-option:hover { background: #555; }
        .cond-list-item { padding: 5px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; color: white; }
        .lang-row { display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin-bottom: 5px; cursor: pointer; color: white; font-size: 0.9rem; }
        .master-only { display: none; gap: 5px; align-items: center; }
        .chat-image-attachment { max-width: 200px; max-height: 200px; border-radius: 5px; margin-top: 8px; display: block; border: 1px solid var(--gold); }
        
        .btn-rec { background: #b71c1c; color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .recording-active { animation: pulse-red 1.5s infinite; background: red; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
        audio { max-width: 100%; height: 35px; margin-top: 8px; }
        .del-msg { color: #ff5252; cursor: pointer; margin-left: 10px; font-size: 0.9rem; opacity: 0.5; }

        #initiative-tracker { background: rgba(183, 28, 28, 0.8); color: white; padding: 8px 10px; font-size: 0.8rem; display: none; overflow-x: auto; white-space: nowrap; border-bottom: 2px solid var(--gold); overscroll-behavior-x: contain; }
        .init-token { display: inline-block; background: #212121; border: 1px solid var(--amber); padding: 3px 8px; margin-right: 6px; border-radius: 12px; font-weight: bold; }

        #pinned-map-container { display: none; background: #151515; padding: 10px; border-bottom: 2px solid var(--gold); text-align: center; }
        .btn-open-map { width: 100%; padding: 15px; font-size: 1.1rem; background: linear-gradient(135deg, #b8860b 0%, #ffca28 50%, #b8860b 100%); color: #000; border: 2px solid white; border-radius: 8px; cursor: pointer; font-weight: bold; text-shadow: 1px 1px 2px rgba(255,255,255,0.5); box-shadow: 0 4px 6px rgba(0,0,0,0.5); transition: transform 0.1s; }
        .btn-open-map:active { transform: scale(0.98); }

        #map-lightbox-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; }
        #zoom-container { flex: 1; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; background: #111; }
        
        #map-wrapper { position: relative; transform-origin: center center; display: inline-block; }
        #zoomable-img { max-width: 100vw; max-height: 80vh; display: block; object-fit: contain; border: 2px solid var(--gold); user-select: none; -webkit-user-drag: none; }
        
        #fog-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: opacity 0.3s; }
        #token-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #ping-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }

        .token-wrapper { position: absolute; pointer-events: auto; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; transition: opacity 0.3s; z-index: 10; }
        .map-token { width: 100%; height: auto; aspect-ratio: 1/1; border-radius: 50%; border: 2px solid var(--amber); object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.8); user-select: none; -webkit-user-drag: none; pointer-events: none; background: #222; }
        
        .token-name-plate { background: rgba(0,0,0,0.8); border: 1px solid var(--amber); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; white-space: nowrap; margin-bottom: 4px; opacity: 0; transition: opacity 0.2s; pointer-events: none; font-weight: bold; text-shadow: 1px 1px 0px black; }
        .token-wrapper:active .token-name-plate, .token-wrapper.active-drag .token-name-plate { opacity: 1; }

        .ping-indicator { position: absolute; width: 24px; height: 24px; background: rgba(255, 0, 0, 0.5); border: 2px solid red; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; animation: ping-pulse 1s ease-out infinite; z-index: 50; }
        .ping-label { position: absolute; background: rgba(0,0,0,0.8); color: white; font-size: 0.7rem; padding: 2px 4px; border-radius: 3px; transform: translate(-50%, -150%); pointer-events: none; border: 1px solid var(--gold); white-space: nowrap; z-index: 51; }
        @keyframes ping-pulse { 0% { width: 10px; height: 10px; opacity: 1; } 100% { width: 60px; height: 60px; opacity: 0; } }

        #map-controls-bar { background: var(--stone); padding: 8px; border-top: 2px solid var(--gold); display: flex; flex-direction: column; gap: 6px; }
        .map-btn-row { display: flex; gap: 8px; justify-content: center; align-items: center; }
        .master-fog-controls { background: #2c1d1a; padding: 8px; border-radius: 5px; display: none; flex-direction: column; gap: 8px; border: 1px solid var(--gold); }
        .active-tool { background: #4caf50 !important; color: white !important; border: 2px solid white !important; box-shadow: 0 0 5px #4caf50; }
        
        .compact-controls { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; align-items: center; width: 100%; }
        .compact-controls button, .compact-controls select { padding: 6px; font-size: 0.75rem; margin: 0; }
        #map-token-select { background: #222; color: white; border: 1px solid var(--gold); border-radius: 4px; width: 130px; }
        .slider-group { display: flex; align-items: center; gap: 5px; color: var(--amber); font-size: 0.65rem; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; }
        .slider-group input[type="range"] { width: 80px; margin: 0; }

        .map-tab-btn { background: #444; color: white; border: 1px solid var(--gold); padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }
        .map-tab-btn.active { background: var(--amber); color: black; font-weight: bold; }
        
        #player-map-tabs { display: none; gap: 5px; justify-content: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<audio id="silent-wake-lock" loop><source src="data:audio/wav;base64,UklGRigAAABXQVZRTU9O" type="audio/wav"></audio>

<div id="login-ui" class="login-overlay">
    <div class="scroll-box">
        <h2 style="color:var(--amber);">🍷 Registro</h2>
        <div id="pg-vault" class="vault-container"></div>
        <input type="text" id="user-name" placeholder="Nome Personaggio">
        <input type="text" id="camp-code" placeholder="Codice Stanza">
        <div id="recent-box" class="recent-rooms hidden"><div id="recent-list"></div></div>
        <label for="user-photo" class="btn-taverna" style="display:block; margin: 5px 0; padding: 10px; background:#444; color:white;">SELEZIONA FOTO</label>
        <input type="file" id="user-photo" accept="image/*" style="display:none">
        <select id="user-role" onchange="document.getElementById('p-extra').classList.toggle('hidden', this.value==='master')">
            <option value="player">Giocatore</option>
            <option value="master">Dungeon Master</option>
        </select>
        <div id="p-extra">
            <input type="text" id="p-race-class" placeholder="Razza e Classe">
            <div style="display:flex; gap:5px;">
                <input type="number" id="p-hp" placeholder="PF Max"><input type="number" id="p-ac" placeholder="CA">
            </div>
            <p style="font-size: 0.8rem; color: var(--amber); margin: 5px 0;">Linguaggi:</p>
            <div id="lang-selection" style="text-align: left; font-size: 0.8rem; height: 80px; overflow-y: auto; background: #333; padding: 5px;"></div>
        </div>
        <button class="btn-taverna" style="width:100%; margin-top:10px;" onclick="joinGame()">ENTRA</button>
    </div>
</div>

<div id="game-ui">
    <header>
        <button class="exit-btn" onclick="exitTavern()">ESCI</button>
        <span id="display-name"></span> | <strong id="display-code"></strong>
        <span id="round-display" style="margin-left:10px; color:white; font-size:0.8rem;"></span>
        <button id="btn-settings" class="settings-btn" onclick="openSettings()">⚙️</button>
    </header>
    <div id="master-panel" class="hidden" style="padding:5px; background: #2c1d1a; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;">
        <button onclick="openSpawnModal()" class="btn-taverna">➕ PNG</button>
        
        <div style="display:flex; gap: 5px; align-items:center; border: 1px solid var(--gold); padding: 5px; border-radius: 4px; background:#111;">
            <button id="btn-tab-map1" onclick="switchMasterMap('map1')" class="map-tab-btn active">MAP 1</button>
            <button id="btn-tab-map2" onclick="switchMasterMap('map2')" class="map-tab-btn">MAP 2</button>
            <label for="map-upload" class="btn-taverna" style="background:var(--amber); color:black; cursor:pointer; padding:6px; margin:0; font-size:0.8rem;">🗺️ CARICA</label>
            <input type="file" id="map-upload" accept="image/*" style="display:none">
        </div>
        
        <button onclick="clearChat()" class="btn-taverna" style="background:#5d4037; color:white;">🧹 PULISCI</button>
        <button onclick="openInitModal()" class="btn-taverna" style="background:red; color:white;">⚔️ INIT</button>
        <button onclick="nextRound()" id="btn-round" class="btn-taverna" style="background:var(--amber);">⌛ ROUND +1</button>
        <button onclick="endCombat()" class="btn-taverna">🏳️ FINE</button>
    </div>
    
    <div id="initiative-tracker"></div>
    
    <div id="pinned-map-container">
        <p id="map-player-indicator" style="color:var(--amber); font-size:0.7rem; margin:0 0 5px 0; text-align:left;"></p>
        <button id="btn-open-map-main" onclick="openMapLightbox()" class="btn-open-map">🗺️ APRI MAPPA ATTIVA 🗺️</button>
    </div>

    <div id="party-bar"></div>
    <div id="chat-flow"></div>
    <div class="input-area">
        <div id="master-only-ui" class="hidden">
            <select id="sender-choice" onchange="filterLangsBySender(this.value)" style="color:var(--amber); background:#222; margin-bottom:5px; font-weight:bold;"><option value="MASTER">Parla come: MASTER</option></select>
            <select id="msg-recipient" onchange="updateWhisperUI(this.value)" style="color:white; font-size:0.8rem; margin-bottom:5px;"><option value="ALL">Destinatario: TUTTI</option><option value="MULTI">SUSSURRO MULTIPLO</option></select>
            <div id="multi-selector"></div>
        </div>
        <div id="player-whisper-ui" class="hidden"><select id="player-msg-recipient" style="color:var(--amber); font-size:0.8rem; width:100%; margin-bottom:5px;"><option value="ALL">A: TUTTI</option></select></div>
        <select id="current-lang" class="lang-select"></select>
        <form onsubmit="sendMsg(); return false;" style="display:flex; gap:5px; width:100%; align-items: center; padding: 5px;">
            <span id="master-controls" class="master-only">
                <label for="chat-photo" class="btn-taverna" style="background:#444; padding:10px; cursor:pointer;">📷</label>
                <input type="file" id="
